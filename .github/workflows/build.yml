name: Build Android Shared Library

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to manually trigger the build with a button click

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Pull your files from the repository into the virtual machine
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Install the lightweight ARM64 cross-compiler tools
    - name: Install Android ARM64 Compiler
      run: |
        sudo apt-get update
        sudo apt-get install -y g++-aarch64-linux-gnu

    # 3. Automatically find and compile your C++ files into the native .so file
    - name: Compile .so File
      run: |
        find . -name "*.cpp" -exec aarch64-linux-gnu-g++ -shared -fPIC -o libmenu.so {} +

    # 4. Upload the finished file so you can download it to your PC
    - name: Upload Finished Binary Artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-so-library
        path: libmenu.so
