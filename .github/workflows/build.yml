name: Build Android Shared Library

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to trigger the build manually with a button click

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Pull your C++ files into the virtual machine
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Install the lightweight ARM64 cross-compiler tools
    - name: Install Android ARM64 Compiler
      run: |
        sudo apt-get update
        sudo apt-get install -y g++-aarch64-linux-gnu

    # 3. Compile your menu.cpp into the native .so file
    - name: Compile .so File
      run: |
        aarch64-linux-gnu-g++ -shared -fPIC -o libmenu.so menu.cpp

    # 4. Upload the finished file so you can download it to your PC
    - name: Upload Finished Binary Artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-so-library
        path: libmenu.so
