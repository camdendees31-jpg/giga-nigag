name: Build Android Shared Library

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Pull your files from the repository into the virtual machine
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Install the lightweight ARM64 cross-compiler tools
    - name: Install Android ARM64 Compiler
      run: |
        sudo apt-get update
        sudo apt-get install -y g++-aarch64-linux-gnu

    # 3. Download official Dear ImGui source files directly into the workspace
    - name: Download Dear ImGui Source
      run: |
        wget https://raw.githubusercontent.com/ocornut/imgui/master/imgui.h
        wget https://raw.githubusercontent.com/ocornut/imgui/master/imgui.cpp
        wget https://raw.githubusercontent.com/ocornut/imgui/master/imgui_draw.cpp
        wget https://raw.githubusercontent.com/ocornut/imgui/master/imgui_widgets.cpp
        wget https://raw.githubusercontent.com/ocornut/imgui/master/imgui_tables.cpp
        wget https://raw.githubusercontent.com/ocornut/imgui/master/imgui_internal.h
        wget https://raw.githubusercontent.com/ocornut/imgui/master/imconfig.h

    # 4. Automatically find and compile all C++ files into the native .so file
    - name: Compile .so File
      run: |
        find . -name "*.cpp" -exec aarch64-linux-gnu-g++ -shared -fPIC -o libmenu.so {} +

    # 5. Upload the finished file so you can download it to your PC
    - name: Upload Finished Binary Artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-so-library
        path: libmenu.so
